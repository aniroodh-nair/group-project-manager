<!DOCTYPE html>
<html>
<head>
    <title>Group Project Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 20px;
            background-color: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .controls {
            margin-bottom: 30px;
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            margin-right: 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }
        .btn-balanced {
            background-color: #2196F3;
            color: white;
        }
        .btn-shuffle {
            background-color: #4CAF50;
            color: white;
        }
        button:hover {
            opacity: 0.9;
        }
        #groups-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .group-card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: left;
        }
        .group-card h3 {
            color: #333;
            margin-top: 0;
            border-bottom: 2px solid #2196F3;
            padding-bottom: 10px;
        }
        .student-item {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .student-item:last-child {
            border-bottom: none;
        }
        .student-name {
            font-weight: bold;
            color: #2196F3;
        }
        .student-skills {
            font-size: 12px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Group Project Manager</h1>

        <div class="controls">
            <button class="btn-balanced" onclick="generateGroups()">
                Generate Balanced Groups
            </button>
            <button class="btn-shuffle" onclick="generateGroupsWithShuffle()">
                Generate Shuffled Groups
            </button>
        </div>

        <h2 id="result"></h2>
        <div id="groups-container"></div>
    </div>

<script>
async function generateGroups() {
    const res = await fetch("/generate-groups?shuffle=false");
    const data = await res.json();
    document.getElementById("result").innerText = data.message;
    displayGroups(data.groups);
}

async function generateGroupsWithShuffle() {
    const res = await fetch("/generate-groups?shuffle=true");
    const data = await res.json();
    document.getElementById("result").innerText = data.message + " (Shuffled)";
    displayGroups(data.groups);
}

function displayGroups(groups) {
    const container = document.getElementById("groups-container");
    container.innerHTML = "";
    
    groups.forEach((group, index) => {
        const card = document.createElement("div");
        card.className = "group-card";
        
        let studentsHTML = "";
        group.forEach(student => {
            const skills = student.skills.join(", ");
            studentsHTML += `
                <div class="student-item">
                    <div class="student-name">${student.name}</div>
                    <div class="student-skills">Skills: ${skills}</div>
                </div>
            `;
        });
        
        card.innerHTML = `
            <h3>Group ${index + 1}</h3>
            ${studentsHTML}
        `;
        
        container.appendChild(card);
    });
}
</script>

</body>
</html>
